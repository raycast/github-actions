name: "Publish NPM to a given registry"

description: "Publish NPM to a given registry"

inputs:
  npm_package_path:
    description: "NPM package path"
  npm_registry:
    description: "NPM registry"
    required: false
  npm_publish_token:
    description: "Publish token"
    required: false
  dry_run:
    description: "When 'true', run `npm publish --dry-run` (validate/pack only, nothing is uploaded and the registry is not changed)"
    required: false
    default: "false"
outputs:
  version:
    description: "version"
    value: ${{ steps.publish_npm.outputs.version }}
runs:
  using: "composite"
  steps:
    - name: Ensure required NPM version for Trusted Publishers
      if: ${{ inputs.npm_publish_token == '' }}
      id: npm_setup
      shell: bash
      run: |
        required_version="11.5.1"
        current_version=$(npm --version)
        if npx semver "$current_version" -r "<$required_version" >/dev/null 2>&1; then
          echo "Upgrading npm from $current_version to $required_version"
          npm install -g npm@$required_version
          echo "previous_version=$current_version" >> $GITHUB_OUTPUT
        fi
    - name: Publish NPM
      shell: bash
      working-directory: ${{ inputs.npm_package_path }}
      id: publish_npm
      env:
        INPUT_NPM_REGISTRY: ${{ inputs.npm_registry }}
        INPUT_NPM_PUBLISH_TOKEN: ${{ inputs.npm_publish_token }}
        INPUT_DRY_RUN: ${{ inputs.dry_run }}
      run: |
        if [[ -n "$INPUT_NPM_REGISTRY" ]]; then
          if [[ -n "$INPUT_NPM_PUBLISH_TOKEN" ]]; then
            echo "//$INPUT_NPM_REGISTRY/:_authToken=$INPUT_NPM_PUBLISH_TOKEN" >> .npmrc
          fi
          echo "@raycast:registry=https://$INPUT_NPM_REGISTRY" >> .npmrc
        fi

        version=`jq -r .version package.json`
        name=`jq -r .name package.json`
        public_version=`npm show $name version`

        echo "Candidate version: $version"
        echo "Registry version: $public_version"

        if [[ "$version" != "$public_version" ]]; then
            if [[ "$INPUT_DRY_RUN" == "true" ]]; then
                echo "::notice ::[dry-run] would publish $name@$version --tag latest (nothing uploaded)"
                npm publish --tag latest --dry-run
            else
                npm publish --tag latest
                echo "version=$version" >> $GITHUB_OUTPUT
            fi
        else
            echo "Skipping API publishing"
        fi
    - name: Restore previous NPM version
      if: ${{ always() && steps.npm_setup.outputs.previous_version != '' }}
      shell: bash
      env:
        PREVIOUS_NPM_VERSION: ${{ steps.npm_setup.outputs.previous_version }}
      run: |
        echo "Restoring npm to previous version $PREVIOUS_NPM_VERSION"
        npm install -g "npm@$PREVIOUS_NPM_VERSION"
